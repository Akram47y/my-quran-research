<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>কুরআন গবেষণা ও শব্দানুবাদ প্ল্যাটফর্ম</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 0;
            color: #333;
        }
        header {
            background-color: #1a365d;
            color: white;
            text-align: center;
            padding: 30px 15px;
        }
        header h1 {
            margin: 0 0 10px 0;
            font-size: 26px;
        }
        header p {
            margin: 0;
            font-size: 14px;
            color: #cbd5e0;
        }
        .container {
            max-width: 800px;
            margin: 25px auto;
            padding: 0 15px;
        }
        .section-title {
            color: #1a365d;
            font-size: 20px;
            margin-bottom: 15px;
            border-bottom: 2px solid #2b6cb0;
            display: inline-block;
            padding-bottom: 5px;
        }
        .surah-card {
            background: #ffffff;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            text-decoration: none;
            color: inherit;
            display: block;
            transition: transform 0.2s, box-shadow 0.2s;
            border-left: 4px solid #2b6cb0;
        }
        .surah-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
        }
        .surah-card h3 {
            margin: 0 0 8px 0;
            color: #2b6cb0;
            font-size: 20px;
        }
        .surah-card p {
            margin: 0;
            color: #718096;
            font-size: 14px;
        }
    </style>
</head>
<body>

<header>
    <h1>কুরআন গবেষণা ও শব্দানুবাদ প্ল্যাটফর্ম</h1>
    <p>শব্দ ও মূল রুট বিশ্লেষণের মাধ্যমে সঠিক অনুবাদের প্রয়াস</p>
</header>

<div class="container">
    <h2 class="section-title">কুরআন অনুবাদ ও রুট বিশ্লেষণ</h2>

    <!-- সূরা আল-ফাতিহা (যেটিতে ক্লিক করলে আয়াতে যাবে) -->
    <a href="quran.html" class="surah-card">
        <h3>সূরা আল-ফাতিহা</h3>
        <p>প্রতিটি শব্দের মূল রুট ও বাংলা অর্থ সহ অনুবাদ পড়ুন...</p>
    </a>

    <!-- সূরা আল-বাকারা -->
    <div class="surah-card" style="opacity: 0.7; cursor: not-allowed;">
        <h3>সূরা আল-বাকারা</h3>
        <p>প্রতিটি শব্দের মূল রুট ও বাংলা অর্থ সহ অনুবাদ পড়ুন (শীঘ্রই আসছে...)</p>
    </div>
</div>

</body>
</html>
